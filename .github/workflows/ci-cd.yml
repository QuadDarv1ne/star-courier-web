# GitHub Actions CI/CD для StarCourier Web
# Автоматическая сборка, тестирование и деплой

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Окружение для деплоя'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # LINT & FORMAT
  # ============================================================================
  
  lint-and-format:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      # Backend lint
      - name: 📦 Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: 🔍 Flake8 lint
        run: |
          cd backend
          flake8 app/ tests/ --count --statistics
      
      - name: 🔤 isort check
        run: |
          cd backend
          isort --check-only app/ tests/
      
      - name: ⚫ Black format check
        run: |
          cd backend
          black --check app/ tests/
      
      - name: 🔎 mypy type check
        run: |
          cd backend
          mypy app/ --ignore-missing-imports
      
      # Frontend lint
      - name: 📦 Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: 🔍 ESLint check
        run: |
          cd frontend
          npm run lint
      
      - name: 📝 Prettier check
        run: |
          cd frontend
          npm run format -- --check

  # ============================================================================
  # BACKEND TESTS
  # ============================================================================
  
  backend-tests:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-format]
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: starcourier_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: 🧪 Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html \
            --junitxml=test-results/backend-junit.xml \
            -o log_cli=true \
            -o log_cli_level=INFO
      
      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
      
      - name: 📄 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            backend/test-results/
            backend/htmlcov/
          retention-days: 7

  # ============================================================================
  # FRONTEND TESTS
  # ============================================================================
  
  frontend-tests:
    name: 🎨 Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-format]
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: 📦 Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: 🧪 Run tests
        run: |
          cd frontend
          npm run test:coverage -- --reporter=junit --outputFile=test-results/frontend-junit.xml
      
      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
      
      - name: 📄 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: |
            frontend/test-results/
            frontend/coverage/
          retention-days: 7

  # ============================================================================
  # BUILD
  # ============================================================================
  
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-tests, frontend-tests]
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      
      - name: 🛠️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 📦 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      - name: 📄 Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      
      - name: 📄 Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ============================================================================
  # SECURITY SCAN
  # ============================================================================
  
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install safety
        run: pip install safety
      
      - name: 🔍 Check dependencies
        run: |
          cd backend
          safety check -r requirements.txt
          safety check -r requirements-dev.txt
      
      - name: 🕵️ Bandit security scan
        run: |
          cd backend
          pip install bandit
          bandit -r app/ -ll
      
      - name: 🔎 Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: 📄 Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # DEPLOY
  # ============================================================================
  
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [security-scan, build]
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    environment:
      name: staging
      url: https://staging.starcourier.com
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🚀 Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Добавить команды деплоя (kubectl, docker-compose, etc.)
      
      - name: ✅ Health check
        run: |
          echo "Running health checks..."
          # curl -f https://staging.starcourier.com/health || exit 1

  deploy-production:
    name: 🌍 Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [security-scan, build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://starcourier.com
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🚀 Deploy to production
        run: |
          echo "Deploying to production..."
          # Добавить команды деплоя
      
      - name: ✅ Health check
        run: |
          echo "Running health checks..."
          # curl -f https://starcourier.com/health || exit 1
      
      - name: 📢 Notify success
        if: success()
        run: |
          echo "Deployment to production successful!"
      
      - name: ❌ Notify failure
        if: failure()
        run: |
          echo "Deployment to production failed!"
          exit 1

  # ============================================================================
  # NOTIFY
  # ============================================================================
  
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    
    steps:
      - name: 📢 Send notification
        run: |
          echo "Sending notification..."
          # Добавить отправку уведомлений (Slack, Discord, Telegram, Email)
