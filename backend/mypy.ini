# StarCourier Web - mypy configuration
# Проверка типов в Python коде

[mypy]
# Целевая версия Python
python_version = 3.13

# Основные настройки
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True
warn_redundant_casts = True
check_untyped_defs = True
strict_optional = True
strict_equality = True

# Импорт
ignore_missing_imports = True
follow_imports = normal
follow_imports_for_stubs = True

# Формат вывода
pretty = True
show_error_codes = True
show_column_numbers = True
show_error_context = True
error_summary = True

# Исключения
exclude =
    \.venv/
  | venv/
  | node_modules/
  | __pycache__/
  | \.git/
  | migrations/
  | alembic/
  | \.mypy_cache/
  | \.pytest_cache/

# Плагины
plugins = pydantic.mypy

# Строгость
disallow_untyped_defs = False  # Включить позже
disallow_incomplete_defs = False  # Включить позже
disallow_untyped_calls = False  # Включить позже
disallow_untyped_decorators = False
disallow_subclassing_any = False

# Динамические типы
disallow_any_unnamed = False
disallow_any_generics = False
disallow_any_expr = False
disallow_any_decorated = False
disallow_any_explicit = False

# None и Optional
no_implicit_optional = True
strict_optional = True

# Предупреждения
warn_no_return = True
warn_unreachable = True

# Разное
allow_redefinition = True
local_partial_types = True
implicit_reexport = False
strict_concatenate = False

# Настройки для pydantic
[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True
warn_untyped_fields = True

# Игнорирование конкретных модулей
[mypy-alembic.*]
ignore_errors = True

[mypy-migrations.*]
ignore_errors = True

[mypy-app.config]
# Конфигурация может быть динамической
disable_error_code = var-annotated

[mypy-app.main]
# Главный файл может импортировать много всего
disable_error_code = import-untyped

[mypy-tests.*]
# Тесты могут быть менее строгими
disallow_untyped_defs = False
disallow_untyped_calls = False
