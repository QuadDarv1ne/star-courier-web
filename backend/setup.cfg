# StarCourier Web - isort configuration
# Сортировка импортов в Python файлах

[settings]
# Профиль совместимости с Black
profile = black

# Длина строки
line_length = 100

# Целевая версия Python
target_version = py313

# Кодировка
encoding = utf-8

# Формат импортов
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True

# Разделители между секциями
lines_between_types = 1
lines_between_sections = 1

# Секции импортов
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER

# Известные секции
known_first_party = app
known_third_party = fastapi,pydantic,sqlalchemy,pytest,uvicorn

# Что игнорировать
skip = .venv,venv,node_modules,.git,__pycache__,migrations,alembic
skip_glob = **/migrations/**,**/alembic/**,**/venv/**

# Игнорировать ошибки
ignore = I001,I003

# Сортировка по алфавиту
force_sort_within_sections = True
order_by_type = True
case_sensitive = False

# Дополнительные настройки
combine_as_imports = True
force_single_line = False
length_sort = False
length_sort_straight = False

# Логирование
verbose = True
show_diff = True
